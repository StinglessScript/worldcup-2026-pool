<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Scores - World Cup 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #fff;
    }
    .status {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .status.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22c55e;
      display: block;
    }
    .status.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      display: block;
    }
    .status.loading {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #3b82f6;
      display: block;
    }
    .info {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>World Cup 2026</h1>
    <p style="color: #888; margin-bottom: 1.5rem;">Auto Update Scores</p>
    <div id="status" class="status"></div>
    <p class="info">Tự động cập nhật mỗi 5 phút</p>
  </div>

  <script>
    // Thay token của bạn vào đây
    const GITHUB_TOKEN = 'YOUR_GITHUB_TOKEN';
    const WORKFLOW_URL = 'https://api.github.com/repos/StinglessScript/worldcup-2026-pool/actions/workflows/update-scores.yml/dispatches';

    async function triggerUpdate() {
      const statusEl = document.getElementById('status');
      statusEl.className = 'status loading';
      statusEl.textContent = 'Đang cập nhật...';

      try {
        const response = await fetch(WORKFLOW_URL, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${GITHUB_TOKEN}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ ref: 'main' }),
        });

        if (response.status === 204) {
          statusEl.className = 'status success';
          statusEl.textContent = 'Đã gửi yêu cầu cập nhật!';
        } else {
          statusEl.className = 'status error';
          statusEl.textContent = `Lỗi: ${response.status}`;
        }
      } catch (error) {
        statusEl.className = 'status error';
        statusEl.textContent = `Lỗi: ${error.message}`;
      }
    }

    // Auto trigger on page load
    triggerUpdate();
  </script>
</body>
</html>
